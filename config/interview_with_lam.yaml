default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 8382
    cert_file: ""
    cert_key: ""
  history:
    retention_mode: "by_both"
    max_events: 1000
    max_age_seconds: 3600
    cleanup_interval_seconds: 30
  chat_engine:
    model_root: "models"
    concurrent_limit: 5
    handler_search_path:
      - "src/handlers"
    handler_configs:
      LamClient:
        module: client/ws_lam_client/ws_lam_client_handler
        asset_path: "/media/liang/12T/han/OpenAvatarInterview/lam_samples/chatting_avatar_20260519004403.zip"
        connection_ttl: 900
      InterruptHandler:
        module: logic/interrupt/interrupt_handler
      SileroVad:
        module: vad/silerovad/duplex_vad_handler
        speaking_threshold: 0.25
        start_delay: 1024
        end_delay: 80000
        early_end_delay: 80000
        early_end_repeat_delay: 1000
        buffer_look_back: 2048
        speech_padding: 512
        volume_threshold: -50
        post_end_monitor_samples: 32000
        reconnect_threshold_samples: 32000
        post_end_energy_threshold: -5
      SenseVoice:
        enabled: true
        module: asr/sensevoice/asr_handler_sensevoice
        model_name: "iic/SenseVoiceSmall"
        device: "cuda:3"
        input_type_override:
          HUMAN_AUDIO: HUMAN_DUPLEX_AUDIO
        output_type_override:
          HUMAN_TEXT: HUMAN_DUPLEX_TEXT
      SmartTurnEOU:
        enabled: true
        module: vad/smart_turn_eou/eou_handler_smart_turn
        threshold: 0.8
        max_buffer_seconds: 300.0
        sample_rate: 16000
        model_path: "models/smart_turn/smart-turn-v3.1-cpu.onnx"
        input_type_override:
          HUMAN_AUDIO: HUMAN_DUPLEX_AUDIO
      SemanticTurnDetector:
        enabled: true
        module: llm/semantic_turn_detector/semantic_turn_detector_handler
        duplex_mode: true
        api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        model_name: "qwen-plus"
        enable_interrupt_detection: true
        interrupt_on_any_speech: false
        min_text_length_for_interrupt: 2
        enable_completion_detection: false
        min_text_length_for_completion: 1
        interrupt_judge_api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        interrupt_judge_model_name: "qwen-plus"
        request_timeout: 3.0
        max_context_turns: 3
      CosyVoice:
        enabled: true
        module: tts/bailian_tts/tts_handler_cosyvoice_bailian
        voice: "longanlang"
        model_name: "cosyvoice-v2"
      InterviewAgent:
        enabled: true
        module: interview/interview_agent_handler
        model_name: "qwen-plus"
        evaluator_model_name: "qwen-plus"
        report_model_name: "qwen-plus"
        question_planner_model: "qwen3.6-flash"
        resume_analyzer_model: "qwen3.6-flash"
        api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        session_base_dir: "runtime/sessions"
        max_questions: 10
        opening_prompt: "我们开始吧。请先做一个简短的自我介绍。"
      LAM_Driver:
        module: avatar/lam/avatar_handler_lam_audio2expression
        device: "cuda:3"
